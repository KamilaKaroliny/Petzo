<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/cadastro.css">

    <script defer src="../js/cadastro.js"></script>

</head>
<body>

<div class="container">

    <div class="logo-area">

        <div class="quadrado q1"></div>
        <div class="quadrado q2"></div>
        <div class="quadrado q3"></div>

        <img src="../assets/images/logo.png" alt="Petzo" class="logo-mobile">

        <img src="../assets/images/dog.png" alt="Cachorro" class="dog">

    </div>

    <div class="cadastro-card">
        <h2>Crie sua conta</h2>

        <form id="cadastroForm">

            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" placeholder="Seu Nome completo" required>

            <label for="email">E-mail:</label>
            <input type="email"id="email"placeholder="Seu Email" required>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" placeholder="Sua Senha" required>

            <label for="confirmarSenha">Confirmar Senha:</label>
            <input type="password" id="confirmarSenha" placeholder="Confirmar sua senha" required>

            <label class="checkbox">

                <input type="checkbox" required>

                Eu aceito a Política de Privacidade e os Termos de Uso

            </label>

            <button type="submit">
                Criar Conta
            </button>

        </form>

        <div class="separador">
           - ou -
        </div>


       <div class="social-login">
           <button class="google-btn">
               <img src="../assets/icons/google.png" alt="Google" class="google-icon">
               Entrar com Google
           </button>
   
           <button class="apple-btn">
               <img src="../assets/icons/apple.png" alt="Apple" class="apple-icon">
               Entrar com Apple
           </button>
       </div>

        <p>
            Já possui uma conta?
            <a href="login.html">Login</a>
        </p>
    </div>
</div>

<img src="../assets/images/logo.png" alt="Petzo" class="logo-desktop">

</body>
</html>
