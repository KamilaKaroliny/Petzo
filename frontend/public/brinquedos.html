<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petz - Categoria</title>
    <link rel="stylesheet" href="../css/categoria.css">
</head>
<body>

    <header>
        <div class="menu">☰</div>

        <img src="../assets/images/logo.png" alt="Logo Petz" class="logo">

        <input type="text" placeholder="Pesquisar">

        <div class="perfil">👤</div>
    </header>

    <section class="carrossel">
        <div class="slides">
            <img src="../assets/images/brinquedos.png" alt="Brinquedos">
            <img src="../assets/images/aves.png" alt="Aves">
            <img src="../assets/images/acessorios.png" alt="Acessorios">
            <img src="../assets/images/aquaticos.png" alt="Aquaticos">
            <img src="../assets/images/cashback.png" alt="Cash Back">
            <img src="../assets/images/cupom.png" alt="Cupom">
            <img src="../assets/images/frete.png" alt="Frete">
            <img src="../assets/images/racao.png" alt="ração">
            <img src="../assets/images/roedores.png" alt="Roedores">
        </div>
    </section>

    <h2>Brinquedos</h2>

    <section class="produtos">

        <div class="produto">
            <img src="../assets/images/brinquedos/Bolinha porta petiscos.png" alt="">
        </div>

        <div class="produto">
            <img src="../assets/images/brinquedos/Bolinha unicórnio com textura.png" alt="">
        </div>

        <div class="produto">
            <img src="../assets/images/brinquedos/Bolinhas Sensoriais para Pets.png" alt="">
        </div>

        <div class="produto">
            <img src="../assets/images/brinquedos/Pelucia com trança mordedora.png" alt="">
        </div>

        <div class="produto">
            <img src="../assets/images/brinquedos/Ratinho de controle remoto.png" alt="">
        </div>

        <div class="produto">
            <img src="../assets/images/brinquedos/Trança mordedora com bolinha Pink.png" alt="">
        </div>

    </section>

    <h2>Camas</h2>

    <section class="produtos">

        <div class="produto">
            <img src="../assets/images/camas/Cama PET Concha - Cinza.png" alt="">
        </div>

        <div class="produto">
            <img src="../assets/images/camas/Cama PET Listras - Amarela.png" alt="">
        </div>

        <div class="produto">
            <img src="../assets/images/camas/Cama PET Luxo - Azul.png" alt="">
        </div>

        <div class="produto">
            <img src="../assets/images/camas/Cama PET quadriculada - Beje.png" alt="">
        </div>

        <div class="produto">
            <img src="../assets/images/camas/Cama PET Redonda - Verde.png" alt="">
        </div>

        <div class="produto">
            <img src="../assets/images/camas/Cama PET Renda - Preto.png" alt="">
        </div>


    </section>

</body>
</html>
