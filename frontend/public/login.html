<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/login.css">

    <script defer src="../js/login.js"></script>
</head>
<body>

<div class="container">

    <div class="logo-area">
        <img src="../assets/images/logo.png" alt="Petzo">
    </div>

    <div class="login-card">


        <h2>Bem-vindo</h2>


        <form id="loginForm">


            <input
                type="email"
                id="email"
                placeholder="E-mail"
                required
            >

            <input
                type="password"
                id="senha"
                placeholder="Senha"
                required
            >

            <a href="#">Esqueceu sua senha?</a>

            <button type="submit">
                Entrar
            </button>


        </form>

        <div class="separador">
            ou
        </div>

        <button class="google-btn">
            Entrar com Google
        </button>

        <button class="apple-btn">
            Entrar com Apple
        </button>

        <p>
            Não possui uma conta?
            <a href="cadastro.html">Criar</a>
        </p>
    </div>

</div>

</body>
</html>
