
<!DOCTYPE html>
<html lang="pt-BR">

<head>
 <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/produto.css">
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Produto</title>

<link rel="stylesheet"
href="../src/css/global.css">

<link rel="stylesheet"
href="../src/css/produto.css">

<script src="../src/data/produtos.js"></script>

<script defer
src="../src/js/produto.js">
</script>

</head>

<body>

<header>

<button
class="voltar"
onclick="history.back()">

←

</button>

<img
src="../src/assets/images/logo/logo.png"
class="logo">

</header>

<main>

<h2 id="nomeProduto"></h2>

<div class="produto-container">

    <img
    id="imagemPrincipal"
    class="imagem-principal">

    <div
    id="miniaturas"
    class="miniaturas">
    </div>

</div>

<div class="info">

    <h3 id="precoProduto"></h3>

    <p id="descricaoProduto"></p>

</div>

<div class="frete">

    <input
    type="text"
    id="cep"
    placeholder="CEP">

    <button id="btnFrete">

        Calcular Frete

    </button>

</div>

<p id="resultadoFrete"></p>

<div class="acoes">

    <button id="btnCarrinho">

        🛒 Adicionar ao Carrinho

    </button>

    <button id="btnFavorito">

        ❤️

    </button>

</div>

<h3 class="titulo-relacionados">

Produtos Relacionados

</h3>

<div
id="produtosRelacionados"
class="relacionados">

</div>

</main>

</body>
</html>
