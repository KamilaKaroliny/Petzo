<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petz - Bolinha Porta Petiscos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/produto.css">
</head>
<body>

    <div class="app-container">
        <header>
            <div class="back-button">
                <i class="fa-solid fa-arrow-left"></i>
            </div>
            <div class="logo">
                Petz<i class="fa-solid fa-paw" style="font-size: 16px;"></i>
            </div>
            <div style="width: 35px;"></div> </header>

        <main class="product-container">
            
            <div class="product-gallery">
                <div class="main-image-box">
                    <img src="../assets/images" alt="Bolinha porta petiscos">
                </div>
                
                <div class="gallery-footer">
                    <div class="pagination-dots">
                        <span class="dot active"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                    <div class="wishlist-icon">
                        <i class="fa-regular fa-heart"></i>
                    </div>
                </div>
            </div>

            <div class="product-details">
                <h1 class="product-title">Bolinha porta petiscos</h1>
                <div class="product-price">R$14,90</div>
                
                <p class="product-description">
                    Diversão e estímulo para o seu pet todos os dias. Feita com material 
                    resistente e seguro, libera petiscos enquanto o animal brinca, incentivando 
                    o raciocínio. Fácil de usar e perfeita para momentos de entretenimento.
                </p>

                <div class="shipping-box">
                    <div class="cep-input-wrapper">
                        <label for="cep">CEP:</label>
                        <input type="text" id="cep" name="cep">
                    </div>
                    <button class="btn-shipping">Calcular frete</button>
                </div>

                <button class="btn-add-to-cart">
                    <i class="fa-solid fa-circle-plus"></i> Adicionar ao Carrinho
                </button>
            </div>

        </main>

        <section class="recommendations">
            <h2 class="rec-title">Encontre mais brinquedos!</h2>
            
            <div class="rec-grid">
                <div class="rec-item"><img src="../assets/images/brinquedos/" alt="Brinquedo 1"></div>
                <div class="rec-item"><img src="../assets/images/brinquedos/item2.png" alt="Brinquedo 2"></div>
                <div class="rec-item"><img src="../assets/images/brinquedos/item3.png" alt="Brinquedo 3"></div>
                <div class="rec-item"><img src="../assets/images/brinquedos/item4.png" alt="Brinquedo 4"></div>
                <div class="rec-item"><img src="../assets/images/brinquedos/item5.png" alt="Brinquedo 5"></div>
                <div class="rec-item"><img src="../assets/images/brinquedos/item6.png" alt="Brinquedo 6"></div>
                <div class="rec-item"><img src="../assets/images/brinquedos/item7.png" alt="Brinquedo 7"></div>
                <div class="rec-item"><img src="../assets/images/brinquedos/item8.png" alt="Brinquedo 8"></div>
                <div class="rec-item"><img src="../assets/images/brinquedos/item9.png" alt="Brinquedo 9"></div>
                <div class="rec-item"><img src="../assets/images/brinquedos/item10.png" alt="Brinquedo 10"></div>
            </div>
        </section>

        <div class="bottom-accent-bar"></div>

    </div>

</body>
</html>
